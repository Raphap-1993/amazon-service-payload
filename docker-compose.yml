services:
  postgres:
    image: postgres:16-alpine
    container_name: amazon-service-payload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amazon_service_payload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '${POSTGRES_PORT:-55433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d amazon_service_payload']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
