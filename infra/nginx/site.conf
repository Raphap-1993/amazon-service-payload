# Reemplaza los dominios antes de habilitar este archivo.
# Este proyecto vive bajo el usuario Hestia `amazonaviationservice`.
# Nginx es global del VPS, pero la app corre en `127.0.0.1:3004`.

upstream amazon_service_payload_upstream {
  server 127.0.0.1:3004;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name example.com www.example.com;

  client_max_body_size 32m;

  location /_next/static/ {
    proxy_pass http://amazon_service_payload_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    proxy_pass http://amazon_service_payload_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 120s;
  }
}
